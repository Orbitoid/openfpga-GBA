name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version
        id: version
        run: |
          CURRENT=$(jq -r '.core.metadata.version' pkg/Cores/Orbitoid.GBA_Analogizer/core.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          jq --arg v "$NEW" '.core.metadata.version = $v' pkg/Cores/Orbitoid.GBA_Analogizer/core.json > tmp.json && mv tmp.json pkg/Cores/Orbitoid.GBA_Analogizer/core.json
          jq --arg d "$(date -u +%Y-%m-%d)" '.core.metadata.date_release = $d' pkg/Cores/Orbitoid.GBA_Analogizer/core.json > tmp.json && mv tmp.json pkg/Cores/Orbitoid.GBA_Analogizer/core.json
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT -> $NEW"

      - name: Compile Analogizer
        run: scripts/build_analogizer.sh

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pkg/Cores/Orbitoid.GBA_Analogizer/core.json
          git commit -m "release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin HEAD --tags

      - name: Package release zip
        run: |
          mkdir -p release_pkg/Cores
          cp -R pkg/Assets pkg/Platforms pkg/instructions.txt release_pkg/
          cp -R pkg/Cores/Orbitoid.GBA_Analogizer release_pkg/Cores/
          cd release_pkg && zip -r ../Orbitoid.GBA_Analogizer_${{ steps.version.outputs.version }}.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: Orbitoid.GBA_Analogizer_${{ steps.version.outputs.version }}.zip
          generate_release_notes: true

      - name: Extract timing closure failures
        if: always()
        run: |
          STA="src/fpga/build/output_files/ap_core_analogizer.sta.summary"
          if [ -f "$STA" ]; then
            awk '
              /^Type/  { type_line = $0 }
              /^Slack/ { slack_line = $0; sub(/^Slack *: */, "", slack_line); slack = slack_line + 0 }
              /^TNS/   {
                tns_line = $0; sub(/^TNS *: */, "", tns_line); tns = tns_line + 0
                if (slack < 0) {
                  print type_line
                  print "Slack: " slack_line
                  print "TNS:   " tns_line
                  print ""
                }
                type_line = ""; slack = 0
              }
            ' "$STA" > timing.txt
          fi
          if [ ! -s timing.txt ]; then
            echo "No timing closure failures." > timing.txt
          fi

      - name: Upload timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timing
          path: timing.txt

      - name: Check custom STA reports
        if: always()
        run: |
          echo "=== Custom STA reports ==="
          ls -la build_output/reports/ 2>/dev/null || echo "No custom STA reports directory found"
          echo "=== Output files ==="
          ls -la src/fpga/build/output_files/*.rpt src/fpga/build/output_files/*.summary 2>/dev/null || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            src/fpga/build/output_files/ap_core_analogizer.fit.summary
            src/fpga/build/output_files/ap_core_analogizer.fit.rpt
            src/fpga/build/output_files/ap_core_analogizer.sta.summary
            src/fpga/build/output_files/ap_core_analogizer.sta.rpt
            src/fpga/build/output_files/ap_core_analogizer.flow.rpt
            build_output/reports/
